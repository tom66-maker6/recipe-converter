<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recipe Converter</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header class="topbar">
  <div class="user" id="userBox"><span class="muted">signing in…</span></div>
</header>

<div class="hero">
  <img src="/logo.png" class="hero-logo" alt="Recipe Converter" />
</div>

<main>
  <!-- Upload -->
  <section class="dropzone" id="dropzone">
    <div class="dz-inner">
      <div class="dz-icon">⬆</div>
      <h2>Drag &amp; drop your recipes here</h2>
      <p class="muted">PDF, Word, Excel, or a photo/scan — up to 20 files at once.</p>
      <button class="btn" id="browseBtn">Browse files</button>
      <input type="file" id="fileInput" multiple hidden
             accept=".xlsx,.xls,.pdf,.docx,.jpg,.jpeg,.png,.heic" />
    </div>
  </section>

  <!-- Optional AI instructions (collapsible) -->
  <section class="instr">
    <button type="button" class="instr-toggle" id="instrToggle" aria-expanded="false">
      <span class="chev" id="instrChev">▸</span> Optional instructions
    </button>
    <div class="instr-body" id="instrBody" hidden>
      <textarea id="aiInstructions" rows="4"
        placeholder="e.g.&#10;• Replace dark chocolate with Valrhona 70%.&#10;• Rescale the whole recipe to a total of 2 kg.&#10;• Replace the butter with lamination butter.&#10;• Rename ingredient X as ingredient Y."></textarea>
      <p class="muted">Leave empty for a normal free conversion (no AI, no quota used). If you write an
        instruction, the free Google Gemini AI is used for that upload.</p>
    </div>
  </section>

  <div class="batch-actions" id="batchActions" hidden>
    <span id="batchSummary" class="muted"></span>
    <button class="btn ghost" id="downloadAllBtn">⬇ Download all</button>
  </div>

  <!-- File / recipe results -->
  <section id="results"></section>
</main>

<div id="toast" class="toast" hidden></div>
<footer class="appfoot"><span class="muted" id="verTag"></span></footer>
<script src="/app.js"></script>
</body>
</html>
