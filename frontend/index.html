<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recipe Converter</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="logo">Wynn</span>
    <span class="app-name">Recipe Converter</span>
  </div>
  <div class="user" id="userBox"><span class="muted">signing in…</span></div>
</header>

<main>
  <!-- Upload -->
  <section class="dropzone" id="dropzone">
    <div class="dz-inner">
      <div class="dz-icon">⬆</div>
      <h2>Drag &amp; drop your recipes here</h2>
      <p class="muted">PDF, Word, Excel, or a photo/scan — up to 20 files at once.</p>
      <button class="btn" id="browseBtn">Browse files</button>
      <input type="file" id="fileInput" multiple hidden
             accept=".xlsx,.xls,.pdf,.docx,.jpg,.jpeg,.png,.heic" />
    </div>
  </section>

  <div class="batch-actions" id="batchActions" hidden>
    <span id="batchSummary" class="muted"></span>
    <button class="btn ghost" id="downloadAllBtn">⬇ Download all</button>
  </div>

  <!-- File / recipe results -->
  <section id="results"></section>

  <!-- Ingredient DB governance -->
  <section class="panel" id="govPanel" hidden>
    <div class="panel-head" data-toggle="govBody">
      <h3>Shared ingredient database</h3><span class="chev">▾</span>
    </div>
    <div class="panel-body" id="govBody" hidden>
      <p class="muted">Propose a standard name. An administrator approves it globally,
        after which it is reused for everyone and stays reversible.</p>
      <div class="row">
        <input id="propRaw" placeholder="Original name (e.g. Dark couverture)" />
        <span>→</span>
        <input id="propCanon" placeholder="Standard name (e.g. Dark Chocolate 70%)" />
        <button class="btn" id="proposeBtn">Propose</button>
      </div>
      <div id="pendingBox" class="admin-only" hidden></div>
    </div>
  </section>
</main>

<div id="toast" class="toast" hidden></div>
<script src="/app.js"></script>
</body>
</html>
